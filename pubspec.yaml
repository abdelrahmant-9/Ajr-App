name: ajr
description: "Ajr | أجر"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.0
  flutter_svg: ^2.0.10+1
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  vibration: ^3.1.7
  cupertino_icons: ^1.0.8
  provider: ^6.0.5
  get: ^4.7.3
  confetti: ^0.8.0
  lottie: ^3.3.2
  shared_preferences: ^2.5.4
  skeletonizer: ^2.1.3
  fl_chart: ^0.68.0 # Added for charts
  hijri: ^3.0.0 # Added for Hijri calendar
  geocoding: ^3.0.0
  http: ^1.0.0
  intl: ^0.19.0

  # Qibla dependencies
  flutter_compass: ^0.8.0
  geolocator: ^14.0.2
  vector_math: ^2.1.4

  # Offline-First
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  firebase_core: ^4.4.0
  connectivity_plus: ^7.0.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_native_splash:
  color: "#1E4F8A"
  image: assets/images/Ajr.png
  android: true
  ios: true
  android_12:
    color: "#1E4F8A"
    image: assets/images/Ajr.png

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/lottie/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Tajawal-Light.ttf
          weight: 300
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Tajawal-Black.ttf
          weight: 900
